<!DOCTYPE html>
<html lang="vi">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Nộp bài PowerPoint</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial;
    }

    body{
      background:#f1f5f9;
    }

    .topbar{
      background:#ef4444;
      color:white;
      padding:20px;
      font-size:28px;
      font-weight:bold;
      text-align:center;
    }

    .container{
      width:95%;
      max-width:700px;
      margin:40px auto;
      background:white;
      padding:35px;
      border-radius:20px;
      box-shadow:0 5px 20px rgba(0,0,0,0.1);
    }

    h2{
      text-align:center;
      margin-bottom:25px;
      color:#111827;
    }

    label{
      display:block;
      margin-top:18px;
      margin-bottom:8px;
      font-weight:bold;
    }

    input{
      width:100%;
      padding:14px;
      border-radius:12px;
      border:1px solid #ccc;
      font-size:16px;
    }

    .upload-box{
      border:2px dashed #bbb;
      padding:25px;
      border-radius:15px;
      text-align:center;
      background:#fafafa;
    }

    button{
      width:100%;
      margin-top:30px;
      padding:16px;
      border:none;
      border-radius:15px;
      background:#2563eb;
      color:white;
      font-size:20px;
      font-weight:bold;
      cursor:pointer;
    }

    button:hover{
      background:#1d4ed8;
    }

    #status{
      margin-top:20px;
      text-align:center;
      font-size:18px;
      font-weight:bold;
    }

    .success{
      color:green;
    }

    .error{
      color:red;
    }

  </style>
</head>

<body>

  <div class="topbar">
    📤 NỘP BÀI POWERPOINT
  </div>

  <div class="container">

    <h2>🎓 Học sinh nộp bài</h2>

    <label>Họ và tên</label>
    <input type="text" id="hoten" placeholder="Nhập họ tên">

    <label>Lớp</label>
    <input type="text" id="lop" placeholder="Ví dụ: 5A1">

    <label>Năm học</label>
    <input type="text" id="namhoc" value="2025-2026">

    <label>Giáo viên</label>
    <input type="text" id="giaovien" placeholder="Tên giáo viên">

    <label>Chọn file PowerPoint</label>

    <div class="upload-box">
      <input type="file" id="file" accept=".ppt,.pptx">
    </div>

    <button onclick="guiBai()">
      🚀 GỬI BÀI CHO THẦY
    </button>

    <div id="status"></div>

  </div>

  <script src="script.js"></script>

</body>
</html>
